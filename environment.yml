name: flora
channels:
  - conda-forge
  - bioconda
  - defaults

dependencies:
  - python=3.11
  - pip

  # Scientific core
  - numpy>=1.26
  - pandas>=2.1
  - scipy>=1.11
  - pyarrow>=14.0

  # High performance
  - polars>=0.20

  # Analytics core
  - duckdb>=0.10

  # Bioinformatics
  - biom-format>=2.1
  - scikit-bio>=0.5

  # ML
  - scikit-learn>=1.4
  - xgboost>=2.0

  # Visualization
  - plotly>=5.18
  - kaleido

  # Utilities
  - pyyaml>=6.0
  - requests>=2.31
  - tqdm>=4.66
  - rich>=13.7
  - jinja2>=3.1

  # Dev
  - pytest>=7.4
  - pytest-cov
  - ruff
  - mypy

  - pip:
    - flora-bio
    - pydantic>=2.5
    - shap>=0.44
    - optuna>=3.5
    - mlflow>=2.10
    - umap-learn>=0.5
    - hdbscan>=0.8
    - imbalanced-learn>=0.11
    - mkdocs>=1.5
    - mkdocs-material>=9.5
    - mkdocstrings[python]>=0.24
