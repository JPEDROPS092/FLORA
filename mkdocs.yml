site_name: FLORA Documentation
site_description: FLORA - Feature Learning and Omics Research Analytics
site_url: https://flora-bio.readthedocs.io
repo_url: https://github.com/flora-bio/flora
repo_name: flora-bio/flora

theme:
  name: material
  palette:
    - scheme: slate
      primary: teal
      accent: green
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.suggest
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: numpy
            show_source: true
            show_signature_annotations: true

nav:
  - Home: index.md
  - Installation: installation.md
  - Quick Start: quickstart.md
  - User Guide: user_guide.md
  - Web Interface: ui.md
  - Datasets: datasets.md
  - Methods: methods.md
  - Article: article.md
  - Report: report.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - tables
