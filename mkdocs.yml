site_name: FLORA Documentation
site_description: FLORA - Feature Learning and Omics Research Analytics
site_url: https://flora-bio.readthedocs.io
repo_url: https://github.com/flora-bio/flora
repo_name: flora-bio/flora

theme:
  name: material
  palette:
    - scheme: slate
      primary: teal
      accent: green
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.suggest
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: numpy
            show_source: true
            show_signature_annotations: true

nav:
  - Home: index.md
  - Getting Started: getting_started.md
  - Architecture: architecture.md
  - API Reference:
      - Config: api/config.md
      - Database: api/db.md
      - IO: api/io.md
      - Preprocessing: api/preprocessing.md
      - Feature Engineering: api/feature_engineering.md
      - Diversity: api/diversity.md
      - Taxonomy: api/taxonomy.md
      - Machine Learning: api/ml.md
      - Visualization: api/viz.md
      - Reports: api/reports.md
      - Pipelines: api/pipelines.md
  - Tutorials: tutorials/
  - Contributing: contributing.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - tables
